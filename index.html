<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stay Ahead in AI — Don't Fear AI Newsletter</title>
  <meta name="description" content="Join the Don't Fear AI newsletter by Leszek Ignatowicz.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    /* Stylistyka oparta na Twojej wersji v2 */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --ink: #0f0e0e; --paper: #faf8f4; --gold: #c8a951; --teal: #1a7a72; --teal-light: #2da89d;
    }
    body {
      font-family: 'DM Sans', sans-serif; background: var(--ink); color: var(--paper);
      min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 48px 24px; overflow-x: hidden;
    }
    body::before {
      content: ''; position: fixed; inset: 0;
      background: radial-gradient(ellipse 80% 50% at 50% -10%, rgba(45,168,157,0.13) 0%, transparent 60%);
      pointer-events: none; z-index: 0;
    }
    .wrap { position: relative; z-index: 1; width: 100%; max-width: 560px; text-align: center; }
    h1 { font-family: 'Playfair Display', serif; font-size: clamp(2rem, 6vw, 2.8rem); font-weight: 900; margin-bottom: 18px; }
    h1 em { font-style: normal; color: var(--gold); }
    .subtitle { font-size: 1rem; color: rgba(250,248,244,0.65); margin-bottom: 36px; }
    
    /* Formularz */
    .form-card {
      background: rgba(255,255,255,0.05); border: 1px solid rgba(200,169,81,0.25);
      border-top: 2px solid var(--gold); border-radius: 16px; padding: 36px 32px; text-align: left;
    }
    .field-group { margin-bottom: 20px; }
    .field-label { font-size: 0.78rem; font-weight: 600; text-transform: uppercase; color: rgba(250,248,244,0.5); margin-bottom: 8px; display: block; }
    .field-input {
      width: 100%; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12);
      border-radius: 8px; padding: 14px; font-size: 0.95rem; color: var(--paper); outline: none;
    }
    .field-input:focus { border-color: var(--gold); }
    .btn-subscribe {
      width: 100%; background: var(--teal); color: var(--paper); border: none; border-radius: 10px;
      padding: 16px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: 0.2s;
    }
    .btn-subscribe:hover { background: var(--teal-light); box-shadow: 0 0 20px rgba(45,168,157,0.3); }
    
    .benefits { text-align: left; margin-bottom: 30px; }
    .benefit { display: flex; gap: 12px; background: rgba(255,255,255,0.03); padding: 12px; border-radius: 8px; margin-bottom: 8px; }
    .author { margin-top: 30px; font-size: 0.8rem; color: rgba(250,248,244,0.4); }
  </style>
</head>
<body>

<div class="wrap">
  <h1>Be the <em>first</em> to know<br>what's coming next</h1>
  <p class="subtitle">New books. Fresh prompts. Practical AI tools. Straight to your inbox.</p>

  <div class="benefits">
    <div class="benefit"><span>📚</span> <strong>Early access</strong> to new books in the series.</div>
    <div class="benefit"><span>✏️</span> <strong>Ready-to-copy prompts</strong> for daily tasks.</div>
  </div>

  <div class="form-card">
    <form action="https://assets.mailerlite.com/jsonp/2291506/forms/2GxbR4/subscribe" method="post" target="_self">
      <div class="field-group">
        <label class="field-label">First Name</label>
        <input type="text" class="field-input" name="fields[name]" placeholder="Your name">
      </div>
      <div class="field-group">
        <label class="field-label">Email Address</label>
        <input type="email" class="field-input" name="fields[email]" placeholder="email@example.com" required>
      </div>
      
      <input type="hidden" name="ml-submit" value="1">
      
      <button type="submit" class="btn-subscribe">Subscribe →</button>
    </form>

    <p style="font-size: 0.7rem; color: rgba(250,248,244,0.3); margin-top: 15px; text-align: center;">
      No spam. Unsubscribe at any time. <br>
      <a href="https://privacy.aidorzeczy.com/" style="color: var(--gold); text-decoration: none;">Privacy Policy</a>
    </p>
  </div>

  <div class="author">Leszek Ignatowicz · ebooks@aidorzeczy.com</div>
</div>

</body>
</html>
